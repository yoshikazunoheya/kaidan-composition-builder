<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>怪奇書籍館 — Composition Builder</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg:#0a0a0b; --surface:#111113; --surface-2:#1a1a1d; --border:#2e2a20;
  --gold:#d4a843; --gold-dim:#8b6914; --crimson:#8b1a1a; --crimson-lit:#c0392b; --ember:#1f1508;
  --ink:#ede8dc; --ink-mid:#a89e8a; --ink-dim:#6b6355;
  --font-serif:'Shippori Mincho','Hiragino Mincho ProN','Yu Mincho',serif;
  --font-mono:'JetBrains Mono','SFMono-Regular',ui-monospace,monospace;
  --text-mono-size:11px; --text-mono-weight:400; --text-mono-track:0.08em; --text-mono-leading:1.5;
  --type-display:700 28px/1.25 var(--font-serif);
  --type-heading:600 18px/1.4 var(--font-serif);
  --type-body:400 13px/1.85 var(--font-serif);
  --type-label:var(--text-mono-weight) var(--text-mono-size)/var(--text-mono-leading) var(--font-mono);
  --space-xs:8px; --space-sm:16px; --space-md:24px; --space-lg:40px; --space-xl:64px;
  --radius-sm:2px; --radius-md:4px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{margin:0;background:var(--bg)}
body{font-family:var(--font-serif);color:var(--ink);min-height:100vh}
::selection{background:var(--ember);color:var(--gold)}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:2px}
::-webkit-scrollbar-track{background:var(--bg)}

.label{font:var(--text-mono-weight) var(--text-mono-size)/1 var(--font-mono);letter-spacing:var(--text-mono-track);text-transform:uppercase;color:var(--ink-dim)}

.panel{background-color:var(--surface);background-image:var(--washi);background-size:256px 256px;border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--space-md)}

.badge{display:inline-flex;align-items:center;font:var(--text-mono-weight) var(--text-mono-size)/1 var(--font-mono);letter-spacing:var(--text-mono-track);text-transform:uppercase;border-radius:var(--radius-sm);padding:3px 8px;background:transparent}
.badge-gold{color:var(--gold);border:1px solid var(--gold-dim)}
.badge-muted{color:var(--ink-mid);border:1px solid var(--border)}

.btn{font:var(--text-mono-weight) var(--text-mono-size)/1 var(--font-mono);letter-spacing:var(--text-mono-track);border-radius:var(--radius-sm);cursor:pointer;transition:background-color .25s,color .25s,border-color .25s;white-space:nowrap;text-transform:uppercase;appearance:none;outline:none}
.btn-primary{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold);padding:10px 20px}
.btn-primary:hover:not(:disabled){background:var(--ember)}
.btn-primary:disabled{opacity:.4;filter:saturate(.5);cursor:not-allowed}
.btn-danger{background:transparent;color:var(--crimson-lit);border:1px solid transparent;padding:6px 14px}
.btn-danger:hover{background:rgba(139,26,26,.12)}
.btn-secondary{background:transparent;color:var(--ink-dim);border:1px solid var(--border);padding:6px 14px}
.btn-secondary:hover{color:var(--ink-mid);border-color:var(--ink-dim)}

.opt-btn{font:var(--text-mono-weight) var(--text-mono-size)/1 var(--font-mono);letter-spacing:var(--text-mono-track);padding:6px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background-color .25s,color .25s,border-color .25s;appearance:none;outline:none;white-space:nowrap;background:var(--surface-2);color:var(--ink-mid);border:1px solid var(--border)}
.opt-btn:hover{color:var(--ink);border-color:var(--ink-dim)}
.opt-btn.selected{background:var(--ember);color:var(--gold);border-color:var(--gold-dim)}
.opt-btn.selected:hover{background:var(--ember);color:var(--gold);border-color:var(--gold-dim)}

.scene-card{background:var(--surface-2);border-radius:var(--radius-md);padding:var(--space-sm);display:flex;flex-direction:column;gap:var(--space-xs)}
.scene-card.active{border:1px solid var(--gold-dim)}
.scene-card:not(.active){border:1px solid var(--border)}
.sc-num{font:var(--text-mono-weight) var(--text-mono-size)/1 var(--font-mono);letter-spacing:var(--text-mono-track)}
.sc-text{font:var(--type-body);color:var(--ink);margin:0}
.sc-meta{display:flex;flex-wrap:wrap;gap:var(--space-xs);font:var(--text-mono-weight) var(--text-mono-size)/1.4 var(--font-mono);letter-spacing:var(--text-mono-track);color:var(--ink-mid)}

.nav-btn{appearance:none;width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);font:18px/1 var(--font-serif);transition:border-color .2s,color .2s;flex-shrink:0}
.nav-btn:not(:disabled){cursor:pointer;color:var(--gold)}
.nav-btn:not(:disabled):hover{border-color:var(--gold-dim)}
.nav-btn:disabled{color:var(--ink-dim);opacity:.4;cursor:default}

.skip-btn{appearance:none;cursor:pointer;width:100%;border-radius:var(--radius-sm);padding:6px;font:var(--text-mono-weight) var(--text-mono-size)/1 var(--font-mono);letter-spacing:var(--text-mono-track);text-transform:uppercase;transition:all .2s}
.skip-btn.off{background:transparent;border:1px solid var(--border);color:var(--ink-mid)}
.skip-btn.off:hover{color:var(--ink)}
.skip-btn.on{background:rgba(107,99,85,.15);border:1px solid var(--ink-dim);color:var(--ink-dim)}

.memo-textarea{width:100%;box-sizing:border-box;resize:vertical;background:var(--surface-2);color:var(--ink);border:1px solid var(--border);border-radius:var(--radius-md);padding:10px 12px;font:var(--type-body);outline:none;transition:border-color .25s}
.memo-textarea:focus{border-color:var(--gold-dim)}
.memo-textarea::placeholder{color:var(--ink-dim)}
.memo-textarea:disabled{color:var(--ink-dim);opacity:.5}

.upload-zone{border:1px dashed var(--border);border-radius:var(--radius-md);padding:var(--space-md);text-align:center;cursor:pointer;transition:border-color .25s}
.upload-zone:hover{border-color:var(--gold-dim)}

.api-input{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md);padding:6px 10px;color:var(--ink);font:var(--text-mono-weight) var(--text-mono-size)/1.4 var(--font-mono);letter-spacing:.04em;outline:none;transition:border-color .25s;width:220px}
.api-input:focus{border-color:var(--gold-dim)}
.api-input::placeholder{color:var(--ink-dim)}
.api-status{font:var(--type-label);letter-spacing:var(--text-mono-track);color:var(--ink-dim)}
.api-status.ok{color:var(--gold)}

.progress-cell{width:20px;height:20px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}

.preview-box{aspect-ratio:16/9;position:relative;overflow:hidden;border-radius:var(--radius-md)}
.preview-empty{border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink-dim);font:var(--type-label);letter-spacing:var(--text-mono-track);text-align:center;padding:0 24px;text-transform:uppercase;line-height:1.8}
.preview-filled{border:1px solid var(--gold-dim);background:radial-gradient(120% 90% at 50% 8%,#16130c,var(--bg))}

.output-pre{margin:0;white-space:pre-wrap;word-break:break-word;font:var(--text-mono-weight) var(--text-mono-size)/1.7 var(--font-mono);color:var(--ink-mid);background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--space-md)}

.btn-analyze{font:var(--text-mono-weight) var(--text-mono-size)/1 var(--font-mono);letter-spacing:var(--text-mono-track);text-transform:uppercase;background:transparent;border:1px solid var(--border);color:var(--ink-dim);padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;white-space:nowrap;appearance:none;outline:none}
.btn-analyze:hover:not(:disabled){border-color:var(--gold-dim);color:var(--ink-mid)}
.btn-analyze:disabled{opacity:.3;cursor:default}

.copy-btn{font:var(--text-mono-weight) var(--text-mono-size)/1 var(--font-mono);letter-spacing:var(--text-mono-track);text-transform:uppercase;background:var(--surface-2);border:1px solid var(--border);color:var(--ink-dim);padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;appearance:none;outline:none}
.copy-btn:hover{border-color:var(--gold-dim);color:var(--ink-mid)}
.copy-btn.copied{border-color:var(--gold);color:var(--gold)}

.workspace{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:var(--space-md);padding:var(--space-md) var(--space-lg);align-items:start}
.col{display:flex;flex-direction:column;gap:var(--space-md);min-width:0}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.analyzing{animation:pulse 1.2s ease-in-out infinite;color:var(--gold-dim)}

.api-notice{font:var(--text-mono-weight) 10px/1.5 var(--font-mono);color:var(--ink-dim);width:100%;padding-top:var(--space-xs);border-top:1px solid var(--border);margin-top:var(--space-xs)}
</style>
</head>
<body>

<input type="file" id="mdFile" accept=".md,.txt" style="display:none">
<div id="root"></div>

<script>
(function(){
  var c=document.createElement('canvas');c.width=256;c.height=256;
  var ctx=c.getContext('2d');
  for(var i=0;i<14000;i++){var a=Math.random()*0.055;ctx.fillStyle='rgba(210,192,154,'+a+')';var w=Math.random()<0.3?2:1;ctx.fillRect(Math.random()*256,Math.random()*256,w,1)}
  document.documentElement.style.setProperty('--washi','url('+c.toDataURL()+')');
})();
</script>

<script>
var AXES=[
  {key:'angle',label:'アングル',mono:'ANGLE',options:['バードアイ','ハイアングル','アイレベル','ローアングル','ワームアイ','ダッチ']},
  {key:'size',label:'サイズ',mono:'SIZE',options:['遠景','全身','バストアップ','クローズアップ']},
  {key:'direction',label:'向き',mono:'DIRECTION',options:['正面','左向き','右向き','後ろ姿']}
];

var scenes=[];
var active=0;
var currentSel={};
var currentMemo='';
var isAnalyzingAll=false;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function pad2(n){return String(n).padStart(2,'0')}
function getApiKey(){return localStorage.getItem('openaiApiKey')||''}

function saveApiKey(){
  var key=document.getElementById('apiKeyInput').value.trim();
  var st=document.getElementById('apiStatus');
  if(!key){st.textContent='キーを入力してください';st.className='api-status';return}
  localStorage.setItem('openaiApiKey',key);
  st.textContent='✓ 保存しました';st.className='api-status ok';
}

document.getElementById('mdFile').addEventListener('change',function(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var text=ev.target.result;
    if(text.split('\n').filter(function(l){return l.trim().startsWith('|')}).length>3) parseMdTable(text);
    else parsePlainScript(text);
  };
  reader.readAsText(file,'UTF-8');
  e.target.value='';
});

function parsePlainScript(text){
  var blocks=text.split(/\n---[^\n]*\n|^---[^\n]*\n/m).map(function(b){return b.trim()}).filter(function(b){return b.length>5});
  if(!blocks.length)return;
  scenes=blocks.map(function(block,i){
    return{number:i+1,rawText:block,location:null,characters:null,memo:'',skipped:false,selection:null,analyzing:false,analyzed:false}
  });
  active=0;syncUI();renderAll();
  if(getApiKey())setTimeout(function(){for(var i=0;i<Math.min(3,scenes.length);i++)analyzeScene(i)},300);
}

function parseMdTable(text){
  var lines=text.split('\n');var tl=lines.filter(function(l){return l.trim().startsWith('|')});var parsed=[];
  for(var j=0;j<tl.length;j++){
    var line=tl[j];
    if(/^\|[\s\-|:]+\|$/.test(line))continue;
    var cols=line.split('|').map(function(c){return c.trim()}).filter(function(c,i,a){return i>0&&i<a.length-1});
    if(cols.length<2)continue;
    var num=cols[0].replace(/<br>/gi,'').trim().replace(/^#/,'');
    if(!/^\d+$/.test(num))continue;
    var rawText=(cols[1]||'').replace(/<br>/gi,' ');
    var loc=cols[3]||'—';
    var ch=cols[4]||'—';
    parsed.push({number:parseInt(num),rawText:rawText,location:loc,characters:typeof ch==='string'?ch.split(/[、,]/).map(function(s){return s.trim()}).filter(Boolean):[ch],memo:'',skipped:false,selection:null,analyzing:false,analyzed:true});
  }
  if(!parsed.length)return;
  scenes=parsed;active=0;syncUI();renderAll();
}

async function analyzeScene(idx){
  if(!scenes[idx]||scenes[idx].analyzed||scenes[idx].analyzing)return;
  var apiKey=getApiKey();if(!apiKey)return;
  scenes[idx].analyzing=true;
  if(active===idx)renderRight();
  try{
    var resp=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({model:'gpt-4o-mini',max_tokens:200,messages:[
        {role:'system',content:'日本語の怪談原稿から情報を抽出します。JSONのみ返し、マークダウン記号や説明文は一切含めないでください。'},
        {role:'user',content:'以下の文章から「場所」と「登場人物」を抽出してJSONのみ返してください。\n形式: {"location":"場所（短く）","characters":"人物A、人物B"}\n・場所は文中に実際に登場する場所を短く\n・登場人物は文中に登場・言及されているもののみ（語り手視点の現在なら語り部）\n・確信が持てない場合は「—」\n\n文章:\n'+scenes[idx].rawText.substring(0,600)}
      ]})
    });
    var data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    var rt=data.choices[0].message.content.trim();
    var jm=rt.match(/\{[\s\S]*?\}/);if(!jm)throw new Error('JSON parse failed');
    var result=JSON.parse(jm[0]);
    scenes[idx].location=result.location||'—';
    var ch=result.characters||'—';
    scenes[idx].characters=typeof ch==='string'?ch.split(/[、,]/).map(function(s){return s.trim()}).filter(Boolean):['—'];
    scenes[idx].analyzed=true;
  }catch(e){
    scenes[idx].location='解析失敗';scenes[idx].characters=[String(e.message||e).substring(0,30)];
  }
  scenes[idx].analyzing=false;
  if(active===idx)renderRight();
}

async function analyzeCurrentScene(){
  if(!scenes.length)return;
  scenes[active].analyzed=false;scenes[active].analyzing=false;
  await analyzeScene(active);
}

async function analyzeAll(){
  if(!scenes.length||isAnalyzingAll||!getApiKey())return;
  isAnalyzingAll=true;
  for(var i=0;i<scenes.length;i++){
    if(!scenes[i].analyzed){await analyzeScene(i);await new Promise(function(r){setTimeout(r,300)})}
  }
  isAnalyzingAll=false;
}

function syncUI(){
  if(!scenes.length){currentSel={};currentMemo='';return}
  var s=scenes[active];
  currentSel=s.selection?Object.assign({},s.selection):{};
  currentMemo=s.memo||'';
}

function saveMemo(){
  if(!scenes.length)return;
  var el=document.getElementById('memoInput');
  if(el){currentMemo=el.value;scenes[active].memo=currentMemo}
}

function goScene(d){
  var next=active+d;if(next<0||next>=scenes.length)return;
  saveMemo();active=next;syncUI();renderAll();
  var s=scenes[active];
  if(s.location===null&&!s.analyzing&&getApiKey()){
    analyzeScene(active);
    if(active+1<scenes.length&&scenes[active+1].location===null)analyzeScene(active+1);
  }
}

function jumpToScene(idx){if(idx<0||idx>=scenes.length)return;saveMemo();active=idx;syncUI();renderAll()}
function jumpNextBlock(){saveMemo();active=Math.min((Math.floor(active/10)+1)*10,scenes.length-1);syncUI();renderAll()}

function pickOption(key,opt){
  currentSel[key]=currentSel[key]===opt?undefined:opt;
  renderAxes();renderPreview();
}

function commitScene(){
  if(!scenes.length)return;
  if(!AXES.every(function(a){return currentSel[a.key]}))return;
  saveMemo();
  scenes[active].selection=Object.assign({},currentSel);
  scenes[active].memo=currentMemo;
  scenes[active].skipped=false;
  renderAll();
}

function toggleSkip(){
  if(!scenes.length)return;
  var s=scenes[active];
  if(s.skipped){s.skipped=false}else{s.skipped=true;s.selection=null}
  syncUI();renderAll();
}

function resetAll(){
  scenes.forEach(function(s){s.selection=null;s.memo='';s.skipped=false});
  currentSel={};currentMemo='';renderAll();
}

function buildMarkdown(){
  if(!scenes.length)return '';
  var out='# 構図プラン\n\n';
  scenes.forEach(function(s){
    var num=pad2(s.number);var loc=s.location||'—';
    if(s.skipped){out+='## Scene '+num+' — '+loc+'\n- _[スキップ]_\n\n';return}
    out+='## Scene '+num+' — '+loc+'\n';
    out+='> '+s.rawText.replace(/\n/g,' ').substring(0,100)+'\n\n';
    var chars=Array.isArray(s.characters)?s.characters.join(' / '):(s.characters||'—');
    out+='- **登場**: '+chars+'\n';
    if(s.selection)out+='- **構図**: '+s.selection.angle+' / '+s.selection.size+' / '+s.selection.direction+'\n';
    else out+='- **構図**: _未設定_\n';
    if(s.memo)out+='- **メモ**: '+s.memo+'\n';
    out+='\n';
  });
  return out;
}

function copyOutput(){
  var text=buildMarkdown();if(!text.trim())return;
  navigator.clipboard.writeText(text).then(function(){
    var btn=document.getElementById('copyBtn');
    btn.textContent='✓ COPIED';btn.classList.add('copied');
    setTimeout(function(){btn.textContent='COPY';btn.classList.remove('copied')},2000);
  });
}

/* ── Render ── */

function renderAll(){renderHeader();renderProgress();renderLeft();renderRight();renderOutput()}

function renderHeader(){
  document.getElementById('headerArea').innerHTML=
    '<header style="display:flex;align-items:baseline;gap:var(--space-md);flex-wrap:wrap;padding:var(--space-md) var(--space-lg);border-bottom:1px solid var(--border)">'+
      '<a href="index.html" class="label" style="text-decoration:none" onmouseover="this.style.color=\'var(--gold)\'" onmouseout="this.style.color=\'var(--ink-dim)\'">← HOME</a>'+
      '<h1 style="font:var(--type-display);color:var(--gold);margin:0">怪奇書籍館</h1>'+
      '<span class="label">Composition Builder</span>'+
      '<div style="margin-left:auto">'+
        (scenes.length?'<button class="btn btn-danger" onclick="resetAll()">RESET ALL</button>':'')+
      '</div>'+
    '</header>'+
    '<div style="display:flex;align-items:center;gap:var(--space-xs);flex-wrap:wrap;padding:var(--space-sm) var(--space-lg);border-bottom:1px solid var(--border)">'+
      '<span class="label">OPENAI API KEY</span>'+
      '<input type="password" class="api-input" id="apiKeyInput" placeholder="sk-..." autocomplete="off" value="'+esc(getApiKey())+'">'+
      '<button class="btn btn-secondary" onclick="saveApiKey()">保存</button>'+
      '<span class="api-status'+(getApiKey()?' ok':'')+'" id="apiStatus">'+(getApiKey()?'✓ 保存済み':'—')+'</span>'+
      '<div class="api-notice">※ キーはこのブラウザのlocalStorageにのみ保存されます。サーバーへの送信はOpenAI APIへのリクエストのみです。</div>'+
    '</div>';
}

function renderProgress(){
  var el=document.getElementById('progressArea');
  if(!scenes.length){el.innerHTML='';return}
  var block=Math.floor(active/10),bs=block*10,be=Math.min(bs+10,scenes.length);
  var bsc=scenes.slice(bs,be),done=bsc.filter(function(s){return s.selection||s.skipped}).length;
  var cells='';
  bsc.forEach(function(s,i){
    var idx=bs+i,cur=idx===active,filled=!!s.selection,sk=s.skipped;
    var bdr=cur?'1px solid var(--gold)':'1px solid var(--border)';
    var bg=sk?'var(--surface-2)':filled?'var(--gold-dim)':'transparent';
    var inner=sk?'<span style="color:var(--ink-dim);font-size:8px">—</span>':filled?'<span style="color:var(--gold);font-size:7px">●</span>':'';
    cells+='<div class="progress-cell" style="border:'+bdr+';background:'+bg+'" onclick="jumpToScene('+idx+')" title="Scene '+s.number+'">'+inner+'</div>';
  });
  for(var p=0;p<10-bsc.length;p++)cells+='<div style="width:20px;height:20px;border-radius:var(--radius-sm);border:1px dashed var(--border);opacity:.3"></div>';
  var hasNext=be<scenes.length;
  el.innerHTML=
    '<div style="padding:var(--space-md) var(--space-lg) 0">'+
      '<div class="panel" style="padding:var(--space-sm)">'+
        '<div style="display:flex;align-items:center;gap:var(--space-sm);flex-wrap:wrap">'+
          '<span class="label">BLOCK '+(block+1)+' &nbsp;·&nbsp; '+done+' / '+bsc.length+'</span>'+
          '<div style="display:flex;gap:4px">'+cells+'</div>'+
          (hasNext?'<button class="btn btn-secondary" style="margin-left:auto;padding:4px 10px" onclick="jumpNextBlock()">次の10カットへ ›</button>':'')+
        '</div>'+
      '</div>'+
    '</div>';
}

function renderLeft(){
  var el=document.getElementById('leftCol');
  if(!scenes.length){
    el.innerHTML=
      '<div class="panel">'+
        '<div class="label" style="margin-bottom:var(--space-sm)">SOURCE — 原稿読み込み</div>'+
        '<div class="upload-zone" onclick="document.getElementById(\'mdFile\').click()">'+
          '<p style="font:var(--type-body);color:var(--ink-dim);margin:0">原稿ファイル（.md / .txt）をクリックして選択</p>'+
          '<small style="font:var(--type-label);letter-spacing:var(--text-mono-track);color:var(--ink-dim);display:block;margin-top:var(--space-xs);text-transform:uppercase">--- で区切った原稿、またはシーン一覧MDに対応</small>'+
        '</div>'+
      '</div>';
    return;
  }
  var cur=scenes[active],sk=cur.skipped;
  var hasKey=!!getApiKey();

  // Source bar
  var src=
    '<div class="panel" style="display:flex;align-items:center;gap:var(--space-xs);flex-wrap:wrap">'+
      '<span class="label">SOURCE</span>'+
      '<span class="label" style="color:var(--gold)">'+scenes.length+' SCENES</span>'+
      '<div style="margin-left:auto;display:flex;gap:var(--space-xs)">'+
        '<button class="btn-analyze" onclick="document.getElementById(\'mdFile\').click()">変更</button>'+
        '<button class="btn-analyze" onclick="analyzeAll()"'+(hasKey?'':' disabled')+'>全解析</button>'+
        '<button class="btn-analyze" onclick="analyzeCurrentScene()"'+(hasKey?'':' disabled')+'>再解析</button>'+
      '</div>'+
    '</div>';

  // Scene nav
  var nav=
    '<div class="panel" style="display:flex;flex-direction:column;gap:var(--space-sm)">'+
      '<div style="display:flex;align-items:center;gap:var(--space-sm)">'+
        '<button class="nav-btn" onclick="goScene(-1)"'+(active===0?' disabled':'')+'>‹</button>'+
        '<div style="flex:1;text-align:center">'+
          '<div class="label" style="color:var(--gold);font-size:14px">SCENE '+pad2(cur.number)+'</div>'+
          '<div class="label" style="margin-top:4px"><span style="color:var(--gold)">'+pad2(active+1)+'</span> / '+pad2(scenes.length)+'</div>'+
        '</div>'+
        '<button class="nav-btn" onclick="goScene(1)"'+(active===scenes.length-1?' disabled':'')+'>›</button>'+
      '</div>'+
      '<button class="skip-btn '+(sk?'on':'off')+'" onclick="toggleSkip()">'+(sk?'⊘ SKIPPED — UNDO':'SKIP THIS SCENE')+'</button>'+
    '</div>';

  // Memo
  var memo=
    '<div class="panel">'+
      '<div class="label" style="margin-bottom:var(--space-xs)">状況メモ — SITUATION</div>'+
      '<textarea class="memo-textarea" id="memoInput" placeholder="このシーンの状況・演出意図…" rows="3"'+(sk?' disabled':'')+' oninput="currentMemo=this.value">'+esc(currentMemo)+'</textarea>'+
    '</div>';

  // Axes
  var axes='<div class="panel" id="axesPanel">'+renderAxesInner()+'</div>';

  el.innerHTML=src+nav+memo+axes;
}

function renderAxesInner(){
  var cur=scenes[active],sk=cur.skipped;
  var complete=AXES.every(function(a){return currentSel[a.key]});
  var html='<div class="label" style="margin-bottom:var(--space-md)">COMPOSITION — 3 AXES</div>';
  if(sk){
    html+='<div style="font:var(--type-body);color:var(--ink-dim);font-style:italic">このシーンはスキップされています</div>';
    return html;
  }
  html+='<div style="display:flex;flex-direction:column;gap:var(--space-md)">';
  AXES.forEach(function(a){
    html+='<div><div class="label" style="margin-bottom:var(--space-xs)">'+a.mono+' · '+a.label+'</div><div style="display:flex;flex-wrap:wrap;gap:var(--space-xs)">';
    a.options.forEach(function(o){
      var sel=currentSel[a.key]===o;
      html+='<button class="opt-btn'+(sel?' selected':'')+'" onclick="pickOption(\''+a.key+'\',\''+o+'\')">'+o+'</button>';
    });
    html+='</div></div>';
  });
  html+='</div>';
  html+='<div style="margin-top:var(--space-md)"><button class="btn btn-primary" onclick="commitScene()"'+(complete?'':' disabled')+'>'+(cur.selection?'UPDATE SCENE':'ADD SCENE')+'</button></div>';
  return html;
}

function renderAxes(){
  var el=document.getElementById('axesPanel');
  if(el)el.innerHTML=renderAxesInner();
}

function renderRight(){
  var el=document.getElementById('rightCol');
  if(!scenes.length){
    el.innerHTML=
      '<div class="panel">'+
        '<div class="label">CURRENT SCENE</div>'+
        '<div style="padding:var(--space-lg) 0;text-align:center;font:var(--type-body);color:var(--ink-dim)">原稿ファイルを読み込んでください</div>'+
      '</div>';
    return;
  }
  var cur=scenes[active],sk=cur.skipped;
  var loc=cur.location;
  var chars=Array.isArray(cur.characters)?cur.characters:(cur.characters?[cur.characters]:[]);

  // Badges
  var bg='<span class="badge badge-gold">SCENE '+pad2(cur.number)+'</span>';
  bg+='<span class="badge badge-muted">'+pad2(active+1)+' / '+pad2(scenes.length)+'</span>';
  if(loc&&loc!==null)bg+='<span class="badge badge-muted">'+esc(loc)+'</span>';
  if(sk)bg+='<span class="badge badge-muted">スキップ</span>';
  if(cur.analyzing)bg+='<span class="badge badge-muted analyzing">解析中…</span>';
  chars.forEach(function(c){bg+='<span class="badge badge-muted">'+esc(c)+'</span>'});

  // Card
  var rawDisp=cur.rawText.replace(/\n/g,' ');
  if(rawDisp.length>120)rawDisp=rawDisp.substring(0,120)+'…';
  var numColor=sk?'var(--ink-dim)':'var(--gold)';
  var meta='';
  if(loc||chars.length){
    meta='<div class="sc-meta">';
    if(loc&&loc!==null)meta+='<span>◷ '+esc(loc)+'</span>';
    if(chars.length)meta+='<span>‹ '+chars.map(esc).join(' · ')+' ›</span>';
    meta+='</div>';
  }
  var card=
    '<article class="scene-card'+(sk?'':' active')+'" style="opacity:'+(sk?'.45':'1')+';filter:'+(sk?'grayscale(.6)':'none')+';transition:all .3s">'+
      '<div class="sc-num" style="color:'+numColor+'">SCENE '+pad2(cur.number)+'</div>'+
      '<p class="sc-text">'+esc(rawDisp)+'</p>'+
      meta+
    '</article>';

  el.innerHTML=
    '<div class="panel">'+
      '<div class="label" style="margin-bottom:var(--space-sm)">CURRENT SCENE</div>'+
      '<div style="display:flex;align-items:center;gap:var(--space-xs);margin-bottom:var(--space-sm);flex-wrap:wrap">'+bg+'</div>'+
      card+
    '</div>'+
    '<div class="panel">'+
      '<div class="label" style="margin-bottom:var(--space-sm)">COMPOSITION PREVIEW</div>'+
      '<div id="previewContainer"></div>'+
    '</div>';
  renderPreview();
}

function renderPreview(){
  var el=document.getElementById('previewContainer');if(!el)return;
  if(!scenes.length){el.innerHTML='<div class="preview-box preview-empty">原稿を読み込んでください</div>';return}
  if(scenes[active].skipped){el.innerHTML='<div class="preview-box preview-empty" style="opacity:.5">SKIPPED</div>';return}
  var sel=currentSel;
  if(!AXES.every(function(a){return sel[a.key]})){
    el.innerHTML='<div class="preview-box preview-empty">三軸を選ぶと構図が立ち上がる<br>SELECT ALL THREE AXES</div>';return;
  }
  var vMap={'バードアイ':'10%','ハイアングル':'28%','アイレベル':'50%','ローアングル':'68%','ワームアイ':'84%','ダッチ':'50%'};
  var v=vMap[sel.angle]||'50%';
  var dutch=sel.angle==='ダッチ';
  var sMap={'クローズアップ':60,'バストアップ':42,'全身':28,'遠景':14};
  var sz=sMap[sel.size]||28;
  var h=sel.direction==='左向き'?'60%':sel.direction==='右向き'?'40%':'50%';
  var flip=sel.direction==='左向き';
  var back=sel.direction==='後ろ姿';
  var grid=['33%','66%'].map(function(x){
    return '<div style="position:absolute;left:'+x+';top:0;bottom:0;width:1px;background:rgba(212,168,67,.1)"></div>'+
           '<div style="position:absolute;top:'+x+';left:0;right:0;height:1px;background:rgba(212,168,67,.1)"></div>'
  }).join('');
  var df=dutch?'<div style="position:absolute;inset:0;border:3px solid rgba(212,168,67,.18);transform:rotate(-12deg) scale(1.15);border-radius:4px"></div>':'';
  var eye=back?'':'<div style="position:absolute;top:22%;right:18%;width:6px;height:6px;border-radius:50%;background:rgba(212,168,67,.75)"></div>';
  var subj=
    '<div style="position:absolute;left:'+h+';top:'+v+';'+
    'transform:translate(-50%,-50%) scaleX('+(flip?-1:1)+')'+(dutch?' rotate(-12deg)':'')+';'+
    'width:'+sz+'%;aspect-ratio:3/4;'+
    'background:linear-gradient(180deg,rgba(192,57,43,.3),rgba(139,26,26,.1));'+
    'border:1px solid var(--crimson);border-radius:46% 46% 18% 18%">'+eye+'</div>';
  var lbl='<div style="position:absolute;left:10px;bottom:8px;font:var(--type-label);letter-spacing:var(--text-mono-track);color:var(--gold)">'+
    esc(sel.angle)+' · '+esc(sel.size)+' · '+esc(sel.direction)+'</div>';
  el.innerHTML='<div class="preview-box preview-filled">'+grid+df+subj+lbl+'</div>';
}

function renderOutput(){
  var el=document.getElementById('outputArea');
  if(!scenes.length){el.innerHTML='';return}
  el.innerHTML=
    '<div class="panel" style="padding:var(--space-md)">'+
      '<div style="display:flex;align-items:center;gap:var(--space-sm);margin-bottom:var(--space-sm)">'+
        '<span class="label">OUTPUT — OBSIDIAN MARKDOWN</span>'+
        '<button class="copy-btn" id="copyBtn" onclick="copyOutput()" style="margin-left:auto">COPY</button>'+
      '</div>'+
      '<pre class="output-pre">'+esc(buildMarkdown())+'</pre>'+
    '</div>';
}

/* ── Init ── */
document.getElementById('root').innerHTML=
  '<div id="headerArea"></div>'+
  '<div id="progressArea"></div>'+
  '<div class="workspace"><div class="col" id="leftCol"></div><div class="col" id="rightCol"></div></div>'+
  '<div style="padding:0 var(--space-lg) var(--space-lg)" id="outputArea"></div>';
renderAll();
</script>
</body>
</html>
