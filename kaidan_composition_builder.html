<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>怪奇書籍館 — Composition Builder</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="design-system.css">
</head>
<body>

<input type="file" id="mdFile" accept=".md,.txt" style="display:none">
<input type="file" id="charFile" accept=".json" style="display:none">
<div id="root"></div>

<script src="washi.js"></script>

<script>
var AXES=[
  {key:'angle',label:'アングル',mono:'ANGLE',options:['ハイ','アイレベル','ロー']},
  {key:'size',label:'サイズ',mono:'SIZE',options:['ロング','ミディアム','バスト','CU']},
  {key:'direction',label:'向き',mono:'DIRECTION',options:['正面','斜め前','横','斜め後ろ','背後','POV']}
];

var scenes=[];
var active=0;
var currentSel={};
var currentMemo='';
var isAnalyzingAll=false;
var isGeneratingPrompts=false;
var CHARACTERS={};
var NEGATIVE_CHARACTER_COMMON='';
var charFileName='';
var lastSavedAt=null;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function pad2(n){return String(n).padStart(2,'0')}
function getApiKey(){return localStorage.getItem('openaiApiKey')||''}

/* ── 一時保存（自動保存 + 確認付き復元） ── */
function computeSourceHash(arr){
  if(!arr||!arr.length)return '';
  return arr.length+'|'+(arr[0].rawText||'').substring(0,50);
}

function saveDraft(){
  if(!scenes.length)return;
  try{
    localStorage.setItem('kaidanDraft',JSON.stringify({hash:computeSourceHash(scenes),scenes:scenes,active:active,savedAt:Date.now()}));
    lastSavedAt=Date.now();
    var el=document.getElementById('draftStatus');
    if(el)el.textContent='一時保存 済 '+new Date(lastSavedAt).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  }catch(e){/* 容量超過等は無視、次の保存で再試行 */}
}

function tryRestoreDraft(){
  var raw=localStorage.getItem('kaidanDraft');if(!raw)return false;
  var draft;try{draft=JSON.parse(raw)}catch(e){return false}
  if(!draft||!draft.scenes||!draft.scenes.length)return false;
  if(draft.hash!==computeSourceHash(scenes))return false;
  var hasProgress=draft.scenes.some(function(s){return s.selection||s.skipped||s.prompt});
  if(!hasProgress)return false;
  var when=new Date(draft.savedAt).toLocaleString('ja-JP');
  if(!confirm('同じ原稿の一時保存データが見つかりました（'+when+'）。\n前回の作業内容（構図・メモ・スキップ・生成済みプロンプト）を復元しますか？'))return false;
  scenes=draft.scenes;
  active=Math.min(draft.active||0,scenes.length-1);
  return true;
}

function getBlockRange(idx){
  var block=Math.floor(idx/10),bs=block*10,be=Math.min(bs+10,scenes.length);
  return{block:block,start:bs,end:be};
}

function saveApiKey(){
  var key=document.getElementById('apiKeyInput').value.trim();
  var st=document.getElementById('apiStatus');
  if(!key){st.textContent='キーを入力してください';st.className='api-status';return}
  localStorage.setItem('openaiApiKey',key);
  st.textContent='✓ 保存しました';st.className='api-status ok';
  if(scenes.length)renderLeft();
}

document.getElementById('mdFile').addEventListener('change',function(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var text=ev.target.result;
    if(text.split('\n').filter(function(l){return l.trim().startsWith('|')}).length>3) parseMdTable(text);
    else if(/^#{0,3}\s*シーン\s*\d+\s*$/m.test(text)) parseSceneHeadings(text);
    else parsePlainScript(text);
  };
  reader.readAsText(file,'UTF-8');
  e.target.value='';
});

document.getElementById('charFile').addEventListener('change',function(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var parsed=JSON.parse(ev.target.result);
      CHARACTERS=parsed.CHARACTERS||{};
      NEGATIVE_CHARACTER_COMMON=parsed.NEGATIVE_CHARACTER_COMMON||'';
      charFileName=file.name;
    }catch(err){
      alert('CHARACTERS JSONの読み込みに失敗しました: '+(err.message||err));
      return;
    }
    renderAll();
  };
  reader.readAsText(file,'UTF-8');
  e.target.value='';
});

/* ── キャラJSON照合 ── */
function findCharacterKey(name){
  if(!name)return null;
  var keys=Object.keys(CHARACTERS);
  for(var i=0;i<keys.length;i++){
    var c=CHARACTERS[keys[i]];
    if(c.displayName===name)return keys[i];
    if(Array.isArray(c.aliases)&&c.aliases.indexOf(name)!==-1)return keys[i];
  }
  return null;
}

function validateSceneCharacters(s){
  // 戻り値: [{name, key, status}]  status: 'ok' | 'unresolved' | 'era_missing'
  var chars=Array.isArray(s.characters)?s.characters:[];
  return chars.filter(function(n){return n&&n!=='—'}).map(function(name){
    var key=findCharacterKey(name);
    if(!key)return{name:name,key:null,status:'unresolved'};
    if(!s.era||s.era==='要確認')return{name:name,key:key,status:'era_unknown'};
    if(!CHARACTERS[key].eras||!CHARACTERS[key].eras[s.era])return{name:name,key:key,status:'era_missing'};
    return{name:name,key:key,status:'ok'};
  });
}

function buildCharacterBlock(key,era){
  var c=CHARACTERS[key];if(!c)return null;
  var e=c.eras&&c.eras[era];if(!e)return null;
  return(
    (c.displayName||key)+':\n'+
    'Face: '+c.base.face+'\n'+
    'Eyes: '+c.base.eyes+'\n'+
    'Eyebrows: '+c.base.eyebrows+'\n'+
    'Nose: '+c.base.nose+'\n'+
    'Mouth: '+c.base.mouth+'\n'+
    'Skin: '+c.base.skin+'\n'+
    'Hair: '+c.base.hair_base+(e.hair?' '+e.hair:'')+'\n'+
    'Body: '+c.base.body+'\n'+
    'Clothing ('+era+'): '+e.clothing+'\n'+
    'Personality: '+c.base.personality_note+
    (e.age_note?'\nAge: '+e.age_note:'')
  );
}

/* ── ④ プロンプト生成：固定ブロック ── */
var FIXED_STYLE_HEADER_TMPL='Cinematic live-action Japanese psychological horror drama film still, photorealistic, set in {era}, horizontal 16:9.';
var FIXED_CHARACTER_CONSISTENCY='CHARACTER CONSISTENCY — ABSOLUTE PRIORITY:\nKeep the same faces, hairstyles, body types, ages, posture habits, and clothing across all scenes.\nDo not redesign, recast, beautify, age up, age down, merge, or swap the characters.\nEach named character must look like the same recurring person from the established character sheet.';
var FIXED_CLOTHING_CONTINUITY='CLOTHING CONTINUITY:\nKeep the exact same clothing as established for this story unless the script explicitly states a costume change.\nDo not change clothing based on location, mood, time of day, or genre atmosphere.\nNo added jackets, coats, uniforms, hospital gowns, accessories, or fashionable redesigns unless specified.';
var FIXED_STYLE_BLOCK='STYLE:\ncinematic Japanese psychological horror drama, photorealistic, muted palette, naturalistic lighting, subtle film grain, restrained dread.';
var FIXED_NEGATIVE_TECH='text, caption, subtitle, logo, watermark, UI, title,\nanime, illustration, manga, 3D, CGI-looking skin,\nexcessive gore, explicit injury, exposed flesh, splatter,\nno graphic injury, no explicit medical procedure, no self-harm, no visible wound.';
var ANGLE_EN={'ハイ':'high-angle camera','アイレベル':'eye-level camera','ロー':'low-angle camera'};
var SIZE_EN={'ロング':'long shot','ミディアム':'medium shot','バスト':'bust shot','CU':'close-up shot'};
var DIRECTION_EN={'正面':'front view','斜め前':'three-quarter front view','横':'side view','斜め後ろ':'three-quarter back view','背後':'view from behind','POV':'first-person POV view'};

function buildCompositionBlock(sel){
  return 'COMPOSITION — ABSOLUTE PRIORITY:\nhorizontal 16:9, '+(ANGLE_EN[sel.angle]||sel.angle)+', '+(SIZE_EN[sel.size]||sel.size)+', '+(DIRECTION_EN[sel.direction]||sel.direction)+'.';
}

function buildCharacterBlocksSection(s){
  if(!Object.keys(CHARACTERS).length)return '';
  var chars=Array.isArray(s.characters)?s.characters:[];
  var blocks=chars.filter(function(n){return n&&n!=='—'}).map(function(name){
    var key=findCharacterKey(name);
    if(!key||!s.era||s.era==='要確認')return null;
    return buildCharacterBlock(key,s.era);
  }).filter(Boolean);
  return blocks.length?('CHARACTER BLOCKS:\n\n'+blocks.join('\n\n')):'';
}

function buildFullPrompt(s,sceneEn){
  var parts=[];
  parts.push(FIXED_STYLE_HEADER_TMPL.replace('{era}',(s.era&&s.era!=='要確認')?s.era:"the story's established era"));
  parts.push(FIXED_CHARACTER_CONSISTENCY);
  var cb=buildCharacterBlocksSection(s);if(cb)parts.push(cb);
  parts.push(FIXED_CLOTHING_CONTINUITY);
  parts.push('SCENE:\n'+sceneEn);
  parts.push(buildCompositionBlock(s.selection));
  parts.push(FIXED_STYLE_BLOCK);
  parts.push('NEGATIVE:\n'+FIXED_NEGATIVE_TECH+(NEGATIVE_CHARACTER_COMMON?'\n'+NEGATIVE_CHARACTER_COMMON:''));
  return parts.join('\n\n');
}

async function translateSceneToEnglish(s){
  var apiKey=getApiKey();
  var resp=await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
    body:JSON.stringify({model:'gpt-4o-mini',max_tokens:180,messages:[
      {role:'system',content:'あなたは怪談の原稿から、画像生成プロンプト用の「SCENE」セクションだけを英訳・要約するアシスタントです。原稿全体ではなく、指定された一瞬だけを切り取って描写してください。セリフや説明文は入れず、状況・行動・視線・姿勢のみを英語で簡潔に(3文以内)記述してください。人物の外見(顔・髪型・服装等)は一切書かないでください。それは別セクションで固定済みです。出力は英文のみ、前置きや見出しは付けないでください。'},
      {role:'user',content:'原稿:\n'+s.rawText.substring(0,600)+(s.memo?'\n\n演出メモ:\n'+s.memo:'')}
    ]})
  });
  var data=await resp.json();
  if(data.error)throw new Error(data.error.message);
  return data.choices[0].message.content.trim();
}

async function generatePrompt(idx){
  if(!scenes[idx]||!scenes[idx].selection)return;
  if(promptBlockers(scenes[idx]).length)return;
  if(!getApiKey()){alert('OpenAI APIキーを設定してください');return}
  scenes[idx].promptGenerating=true;
  if(active===idx)renderRight();
  try{
    var sceneEn=await translateSceneToEnglish(scenes[idx]);
    scenes[idx].prompt=buildFullPrompt(scenes[idx],sceneEn);
  }catch(e){
    scenes[idx].prompt=null;
    alert('プロンプト生成に失敗しました: '+(e.message||e));
  }
  scenes[idx].promptGenerating=false;
  if(active===idx)renderRight();
  saveDraft();
}

function promptBlockers(s){
  // 戻り値: 空配列なら生成OK。空でなければ理由の配列（disableの根拠）
  var reasons=[];
  if(!Object.keys(CHARACTERS).length){reasons.push('CHARACTERS未読み込み');return reasons}
  var chars=Array.isArray(s.characters)?s.characters:[];
  var named=chars.filter(function(n){return n&&n!=='—'});
  if(named.length){
    var bad=validateSceneCharacters(s).filter(function(v){return v.status!=='ok'});
    if(bad.length)reasons.push('人物照合エラー: '+bad.map(function(v){return v.name}).join('・'));
  }
  return reasons;
}
function copyPrompt(idx){
  var s=scenes[idx];if(!s||!s.prompt)return;
  navigator.clipboard.writeText(s.prompt).then(function(){
    var btn=document.getElementById('copyPromptBtn');
    if(btn){btn.textContent='✓ COPIED';setTimeout(function(){btn.textContent='COPY PROMPT'},2000)}
  });
}

async function generateAllPrompts(force){
  if(!scenes.length||isGeneratingPrompts||!getApiKey())return;
  var targets=[];
  for(var i=0;i<scenes.length;i++){
    var s=scenes[i];
    if(s.selection&&!s.skipped&&(force||!s.prompt)&&!promptBlockers(s).length)targets.push(i);
  }
  if(!targets.length)return;
  if(force&&!confirm('全シーン中、生成済みプロンプト('+targets.length+'件)を全て上書きして作り直します。よろしいですか？'))return;
  isGeneratingPrompts=true;renderAll();
  for(var j=0;j<targets.length;j++){
    await generatePrompt(targets[j]);
    renderProgress();renderOutput();renderLeft();
    await new Promise(function(r2){setTimeout(r2,300)});
  }
  isGeneratingPrompts=false;renderAll();
}

async function generateBlockPrompts(force){
  if(!scenes.length||isGeneratingPrompts||!getApiKey())return;
  var r=getBlockRange(active);
  var targets=[];
  for(var i=r.start;i<r.end;i++){
    var s=scenes[i];
    if(s.selection&&!s.skipped&&(force||!s.prompt)&&!promptBlockers(s).length)targets.push(i);
  }
  if(!targets.length)return;
  if(force&&!confirm('このブロック内の生成済みプロンプト('+targets.length+'件)を全て上書きして作り直します。よろしいですか？'))return;
  isGeneratingPrompts=true;renderAll();
  for(var j=0;j<targets.length;j++){
    await generatePrompt(targets[j]);
    renderProgress();renderOutput();
    await new Promise(function(r2){setTimeout(r2,300)});
  }
  isGeneratingPrompts=false;renderAll();
}

function buildPromptsOutput(){
  if(!scenes.length)return '';
  var r=getBlockRange(active);
  var committed=scenes.slice(r.start,r.end).filter(function(s){return s.prompt});
  if(!committed.length)return '';
  return committed.map(function(s){
    return '### Scene '+pad2(s.number)+' — '+sceneLabel(s)+'\n\n'+s.prompt;
  }).join('\n\n---\n\n');
}

function copyPromptsOutput(){
  var text=buildPromptsOutput();if(!text.trim())return;
  navigator.clipboard.writeText(text).then(function(){
    var btn=document.getElementById('copyPromptsBlockBtn');
    if(btn){btn.textContent='✓ COPIED';btn.classList.add('copied');setTimeout(function(){btn.textContent='COPY';btn.classList.remove('copied')},2000)}
  });
}

function parsePlainScript(text){
  var blocks=text.split(/\n---[^\n]*\n|^---[^\n]*\n/m).map(function(b){return b.trim()}).filter(function(b){return b.length>5});
  if(!blocks.length)return;
  scenes=blocks.map(function(block,i){
    return{number:i+1,rawText:block,location:null,era:null,characters:null,memo:'',skipped:false,selection:null,analyzing:false,analyzed:false}
  });
  var restored=tryRestoreDraft();
  active=restored?active:0;syncUI();renderAll();
  if(!restored&&getApiKey())setTimeout(function(){for(var i=0;i<Math.min(3,scenes.length);i++)analyzeScene(i)},300);
}

function parseSceneHeadings(text){
  var re=/^#{0,3}\s*シーン\s*(\d+)\s*$/gm;
  var matches=[];var m;
  while((m=re.exec(text))){matches.push({num:parseInt(m[1],10),headingIndex:m.index,contentStart:re.lastIndex})}
  if(!matches.length)return;
  var parsed=matches.map(function(mt,i){
    var stop=i+1<matches.length?matches[i+1].headingIndex:text.length;
    var block=text.substring(mt.contentStart,stop).trim();
    var locMatch=block.match(/場所[：:]\s*(.+)/);
    var eraMatch=block.match(/時間軸[：:]\s*(.+)/);
    var chMatch=block.match(/登場人物[：:]\s*(.+)/);
    var contMatch=block.match(/内容[：:]\s*([\s\S]+)/);
    var loc=locMatch?locMatch[1].trim():'—';
    var era=eraMatch?eraMatch[1].trim():null;
    var chRaw=chMatch?chMatch[1].trim():'—';
    var characters=chRaw==='—'?['—']:chRaw.split(/[、,・]/).map(function(s){return s.trim()}).filter(Boolean);
    var body=contMatch?contMatch[1].trim():
      block.replace(/^[*\-]?\s*場所[：:].*$/m,'').replace(/^[*\-]?\s*時間軸[：:].*$/m,'').replace(/^[*\-]?\s*登場人物[：:].*$/m,'').replace(/^[*\-]?\s*内容[：:]?/m,'').trim();
    return{number:mt.num,rawText:body||block,location:loc,era:era,characters:characters,memo:'',skipped:false,selection:null,analyzing:false,analyzed:true}
  });
  if(!parsed.length)return;
  scenes=parsed;active=tryRestoreDraft()?active:0;syncUI();renderAll();
}

function parseMdTable(text){
  var lines=text.split('\n');var tl=lines.filter(function(l){return l.trim().startsWith('|')});var parsed=[];
  for(var j=0;j<tl.length;j++){
    var line=tl[j];
    if(/^\|[\s\-|:]+\|$/.test(line))continue;
    var cols=line.split('|').map(function(c){return c.trim()}).filter(function(c,i,a){return i>0&&i<a.length-1});
    if(cols.length<2)continue;
    var num=cols[0].replace(/<br>/gi,'').trim().replace(/^#/,'');
    if(!/^\d+$/.test(num))continue;
    var rawText=(cols[1]||'').replace(/<br>/gi,' ');
    var loc=cols[3]||'—';
    var ch=cols[4]||'—';
    parsed.push({number:parseInt(num),rawText:rawText,location:loc,era:null,characters:typeof ch==='string'?ch.split(/[、,]/).map(function(s){return s.trim()}).filter(Boolean):[ch],memo:'',skipped:false,selection:null,analyzing:false,analyzed:true});
  }
  if(!parsed.length)return;
  scenes=parsed;active=tryRestoreDraft()?active:0;syncUI();renderAll();
}

async function analyzeScene(idx){
  if(!scenes[idx]||scenes[idx].analyzed||scenes[idx].analyzing)return;
  var apiKey=getApiKey();if(!apiKey)return;
  scenes[idx].analyzing=true;
  if(active===idx)renderRight();
  try{
    var resp=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({model:'gpt-4o-mini',max_tokens:200,messages:[
        {role:'system',content:'日本語の怪談原稿から情報を抽出します。JSONのみ返し、マークダウン記号や説明文は一切含めないでください。'},
        {role:'user',content:'以下の文章から「場所」と「登場人物」を抽出してJSONのみ返してください。\n形式: {"location":"場所（短く）","characters":"人物A、人物B"}\n・場所は文中に実際に登場する場所を短く\n・登場人物は文中に登場・言及されているもののみ（語り手視点の現在なら語り部）\n・確信が持てない場合は「—」\n\n文章:\n'+scenes[idx].rawText.substring(0,600)}
      ]})
    });
    var data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    var rt=data.choices[0].message.content.trim();
    var jm=rt.match(/\{[\s\S]*?\}/);if(!jm)throw new Error('JSON parse failed');
    var result=JSON.parse(jm[0]);
    scenes[idx].location=result.location||'—';
    var ch=result.characters||'—';
    scenes[idx].characters=typeof ch==='string'?ch.split(/[、,]/).map(function(s){return s.trim()}).filter(Boolean):['—'];
    scenes[idx].analyzed=true;
  }catch(e){
    scenes[idx].location='解析失敗';scenes[idx].characters=[String(e.message||e).substring(0,30)];
  }
  scenes[idx].analyzing=false;
  if(active===idx)renderRight();
}

async function analyzeCurrentScene(){
  if(!scenes.length)return;
  scenes[active].analyzed=false;scenes[active].analyzing=false;
  await analyzeScene(active);
}

async function analyzeAll(){
  if(!scenes.length||isAnalyzingAll||!getApiKey())return;
  isAnalyzingAll=true;
  for(var i=0;i<scenes.length;i++){
    if(!scenes[i].analyzed){await analyzeScene(i);await new Promise(function(r){setTimeout(r,300)})}
  }
  isAnalyzingAll=false;
}

function syncUI(){
  if(!scenes.length){currentSel={};currentMemo='';return}
  var s=scenes[active];
  currentSel=s.selection?Object.assign({},s.selection):{};
  currentMemo=s.memo||'';
}

function saveMemo(){
  if(!scenes.length)return;
  var el=document.getElementById('memoInput');
  if(el){currentMemo=el.value;scenes[active].memo=currentMemo}
}

function goScene(d){
  var next=active+d;if(next<0||next>=scenes.length)return;
  saveMemo();active=next;syncUI();renderAll();
  var s=scenes[active];
  if(s.location===null&&!s.analyzing&&getApiKey()){
    analyzeScene(active);
    if(active+1<scenes.length&&scenes[active+1].location===null)analyzeScene(active+1);
  }
}

function jumpToScene(idx){if(idx<0||idx>=scenes.length)return;saveMemo();active=idx;syncUI();renderAll()}
function jumpNextBlock(){saveMemo();active=Math.min((getBlockRange(active).block+1)*10,scenes.length-1);syncUI();renderAll()}

function pickOption(key,opt){
  currentSel[key]=currentSel[key]===opt?undefined:opt;
  renderAxes();renderPreview();
}

function commitScene(){
  if(!scenes.length)return;
  if(!AXES.every(function(a){return currentSel[a.key]}))return;
  saveMemo();
  scenes[active].selection=Object.assign({},currentSel);
  scenes[active].memo=currentMemo;
  scenes[active].skipped=false;
  renderAll();
  saveDraft();
}

function toggleSkip(){
  if(!scenes.length)return;
  var s=scenes[active];
  if(s.skipped){s.skipped=false}else{s.skipped=true;s.selection=null}
  syncUI();renderAll();
  saveDraft();
}

function resetAll(){
  scenes.forEach(function(s){s.selection=null;s.memo='';s.skipped=false});
  currentSel={};currentMemo='';renderAll();
  saveDraft();
}

function sceneSummary(s){
  var t=(s.rawText||'').replace(/\n/g,'').trim();
  var sentences=t.split(/(?<=[。！？])/).filter(Boolean);
  var out='';
  for(var i=0;i<sentences.length&&out.length<20;i++)out+=sentences[i];
  if(!out)out=t;
  return out.length>40?out.substring(0,40)+'…':out;
}

function sceneLabel(s){
  var loc=s.location&&s.location!=='—'?s.location:'';
  var summary=sceneSummary(s);
  return loc?loc+'｜'+summary:summary;
}

function buildMarkdown(){
  if(!scenes.length)return '';
  var r=getBlockRange(active);
  var committed=scenes.slice(r.start,r.end).filter(function(s){return s.selection||s.skipped});
  if(!committed.length)return '';
  var out='# 構図プラン\n\n';
  committed.forEach(function(s){
    var num=pad2(s.number);var label=sceneLabel(s);
    if(s.skipped){out+='## Scene '+num+' — '+label+'\n- _[スキップ]_\n\n';return}
    out+='## Scene '+num+' — '+label+'\n';
    out+='> '+s.rawText.replace(/\n/g,' ').substring(0,100)+'\n\n';
    var chars=Array.isArray(s.characters)?s.characters.join(' / '):(s.characters||'—');
    if(s.era)out+='- **時間軸**: '+s.era+(s.era==='要確認'?' ⚠':'')+'\n';
    out+='- **登場**: '+chars+'\n';
    out+='- **構図**: '+s.selection.angle+' / '+s.selection.size+' / '+s.selection.direction+'\n';
    if(s.memo)out+='- **メモ**: '+s.memo+'\n';
    out+='\n';
  });
  return out;
}

function copyOutput(){
  var text=buildMarkdown();if(!text.trim())return;
  navigator.clipboard.writeText(text).then(function(){
    var btn=document.getElementById('copyBtn');
    btn.textContent='✓ COPIED';btn.classList.add('copied');
    setTimeout(function(){btn.textContent='COPY';btn.classList.remove('copied')},2000);
  });
}

/* ── Render ── */

function renderAll(){renderHeader();renderProgress();renderLeft();renderRight();renderOutput()}

function renderHeader(){

    '<header style="display:flex;align-items:baseline;gap:var(--space-md);flex-wrap:wrap;padding:var(--space-md) var(--space-lg);border-bottom:1px solid var(--border)">'+

      '<h1 style="font:var(--type-display);color:var(--gold);margin:0">怪奇書籍館</h1>'+
      '<span class="label">Composition Builder</span>'+
      '<div style="margin-left:auto;display:flex;align-items:center;gap:var(--space-sm)">'+
        '<span class="label" id="draftStatus" style="color:var(--ink-dim)">'+(lastSavedAt?'一時保存 済 '+new Date(lastSavedAt).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}):'')+'</span>'+
        (scenes.length?'<button class="btn btn-danger" onclick="resetAll()">RESET ALL</button>':'')+

      '<button class="btn btn-secondary" onclick="saveApiKey()">保存</button>'+
      '<span class="api-status'+(getApiKey()?' ok':'')+'" id="apiStatus">'+(getApiKey()?'✓ 保存済み':'—')+'</span>'+
      '<div class="api-notice">※ キーはこのブラウザのlocalStorageにのみ保存されます。サーバーへの送信はOpenAI APIへのリクエストのみです。</div>'+

}

function renderProgress(){
  var el=document.getElementById('progressArea');
  if(!scenes.length){el.innerHTML='';return}
  var r=getBlockRange(active),block=r.block,bs=r.start,be=r.end;
  var bsc=scenes.slice(bs,be),done=bsc.filter(function(s){return s.selection||s.skipped}).length;
  var cells='';
  bsc.forEach(function(s,i){
    var idx=bs+i,cur=idx===active,filled=!!s.selection,sk=s.skipped;
    var bdr=cur?'1px solid var(--gold)':'1px solid var(--border)';
    var bg=sk?'var(--surface-2)':filled?'var(--gold-dim)':'transparent';
    var inner=sk?'<span style="color:var(--ink-dim);font-size:8px">—</span>':filled?'<span style="color:var(--gold);font-size:7px">●</span>':'';
    cells+='<div class="progress-cell" style="border:'+bdr+';background:'+bg+'" onclick="jumpToScene('+idx+')" title="Scene '+s.number+'">'+inner+'</div>';
  });
  for(var p=0;p<10-bsc.length;p++)cells+='<div style="width:20px;height:20px;border-radius:var(--radius-sm);border:1px dashed var(--border);opacity:.3"></div>';
  var hasNext=be<scenes.length;
  var committed=bsc.filter(function(s){return s.selection&&!s.skipped});
  var promptTargets=committed.filter(function(s){return !s.prompt&&!promptBlockers(s).length}).length;
  var promptDoneCount=committed.filter(function(s){return s.prompt}).length;
  var promptBlockedCount=committed.filter(function(s){return promptBlockers(s).length}).length;
  el.innerHTML=
    '<div style="padding:var(--space-md) var(--space-lg) 0">'+
      '<div class="panel" style="padding:var(--space-sm)">'+
        '<div style="display:flex;align-items:center;gap:var(--space-sm);flex-wrap:wrap">'+
          '<span class="label">BLOCK '+(block+1)+' &nbsp;·&nbsp; '+done+' / '+bsc.length+'</span>'+
          '<div style="display:flex;gap:4px">'+cells+'</div>'+
          (promptBlockedCount?'<span class="label" style="color:var(--ink-dim)">⚠ 人物照合エラー '+promptBlockedCount+'件</span>':'')+
          '<div style="margin-left:auto;display:flex;gap:var(--space-xs)">'+
            (promptTargets?'<button class="btn btn-secondary" style="padding:4px 10px" onclick="generateBlockPrompts(false)"'+(isGeneratingPrompts?' disabled':'')+'>'+(isGeneratingPrompts?'PROMPT生成中…':'このブロックをPROMPT一括生成 ('+promptTargets+')')+'</button>':'')+
            (promptDoneCount?'<button class="btn btn-secondary" style="padding:4px 10px" onclick="generateBlockPrompts(true)"'+(isGeneratingPrompts?' disabled':'')+'>ブロックを全て再生成 ('+promptDoneCount+')</button>':'')+
            (hasNext?'<button class="btn btn-secondary" style="padding:4px 10px" onclick="jumpNextBlock()">次の10カットへ ›</button>':'')+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>';
}

function renderLeft(){
  var el=document.getElementById('leftCol');
  if(!scenes.length){
    var charCount0=Object.keys(CHARACTERS).length;
    el.innerHTML=
      '<div class="panel">'+
        '<div class="label" style="margin-bottom:var(--space-sm)">SOURCE — 原稿読み込み</div>'+
        '<div class="upload-zone" onclick="document.getElementById(\'mdFile\').click()">'+
          '<p style="font:var(--type-body);color:var(--ink-dim);margin:0">原稿ファイル（.md / .txt）をクリックして選択</p>'+
          '<small style="font:var(--type-label);letter-spacing:var(--text-mono-track);color:var(--ink-dim);display:block;margin-top:var(--space-xs);text-transform:uppercase">--- で区切った原稿、またはシーン一覧MDに対応</small>'+
        '</div>'+
      '</div>'+
      '<div class="panel" style="display:flex;align-items:center;gap:var(--space-xs);flex-wrap:wrap;margin-top:var(--space-sm)">'+
        '<span class="label">CHARACTERS</span>'+
        (charCount0?
          '<span class="label" style="color:var(--gold)">'+esc(charFileName)+' — '+charCount0+'体</span>':
          '<span class="label" style="color:var(--ink-dim)">未読み込み</span>'
        )+
        '<div style="margin-left:auto">'+
          '<button class="btn-analyze" onclick="document.getElementById(\'charFile\').click()">'+(charCount0?'差し替え':'JSON読込')+'</button>'+
        '</div>'+
      '</div>';
    return;
  }
  var cur=scenes[active],sk=cur.skipped;
  var hasKey=!!getApiKey();

  // Source bar
  var src=
    '<div class="panel" style="display:flex;align-items:center;gap:var(--space-xs);flex-wrap:wrap">'+
      '<span class="label">SOURCE</span>'+
      '<span class="label" style="color:var(--gold)">'+scenes.length+' SCENES</span>'+
      '<div style="margin-left:auto;display:flex;gap:var(--space-xs)">'+
        '<button class="btn-analyze" onclick="document.getElementById(\'mdFile\').click()">変更</button>'+
        '<button class="btn-analyze" onclick="analyzeAll()"'+(hasKey?'':' disabled')+'>全解析</button>'+
        '<button class="btn-analyze" onclick="analyzeCurrentScene()"'+(hasKey?'':' disabled')+'>再解析</button>'+
      '</div>'+
    '</div>';

  // Characters bar
  var charCount=Object.keys(CHARACTERS).length;
  var allCommitted=scenes.filter(function(s){return s.selection&&!s.skipped});
  var allTargets=allCommitted.filter(function(s){return !s.prompt&&!promptBlockers(s).length}).length;
  var allDone=allCommitted.filter(function(s){return s.prompt}).length;
  var charBar=
    '<div class="panel" style="display:flex;align-items:center;gap:var(--space-xs);flex-wrap:wrap">'+
      '<span class="label">CHARACTERS</span>'+
      (charCount?
        '<span class="label" style="color:var(--gold)">'+esc(charFileName)+' — '+charCount+'体</span>':
        '<span class="label" style="color:var(--ink-dim)">未読み込み — 時間軸/人物の照合ができません</span>'
      )+
      '<div style="margin-left:auto;display:flex;gap:var(--space-xs)">'+
        '<button class="btn-analyze" onclick="document.getElementById(\'charFile\').click()">'+(charCount?'差し替え':'JSON読込')+'</button>'+
        (allTargets?'<button class="btn-analyze" onclick="generateAllPrompts(false)"'+(isGeneratingPrompts?' disabled':'')+'>'+(isGeneratingPrompts?'生成中…':'全PROMPT生成 ('+allTargets+')')+'</button>':'')+
        (allDone?'<button class="btn-analyze" onclick="generateAllPrompts(true)"'+(isGeneratingPrompts?' disabled':'')+'>全PROMPT再生成 ('+allDone+')</button>':'')+
      '</div>'+
    '</div>';

  // Scene nav
  var nav=
    '<div class="panel" style="display:flex;flex-direction:column;gap:var(--space-sm)">'+
      '<div style="display:flex;align-items:center;gap:var(--space-sm)">'+
        '<button class="nav-btn" onclick="goScene(-1)"'+(active===0?' disabled':'')+'>‹</button>'+
        '<div style="flex:1;text-align:center">'+
          '<div class="label" style="color:var(--gold);font-size:14px">SCENE '+pad2(cur.number)+'</div>'+
          '<div class="label" style="margin-top:4px"><span style="color:var(--gold)">'+pad2(active+1)+'</span> / '+pad2(scenes.length)+'</div>'+
        '</div>'+
        '<button class="nav-btn" onclick="goScene(1)"'+(active===scenes.length-1?' disabled':'')+'>›</button>'+
      '</div>'+
      '<button class="skip-btn '+(sk?'on':'off')+'" onclick="toggleSkip()">'+(sk?'⊘ SKIPPED — UNDO':'SKIP THIS SCENE')+'</button>'+
    '</div>';

  // Memo
  var memo=
    '<div class="panel">'+
      '<div class="label" style="margin-bottom:var(--space-xs)">状況メモ — SITUATION</div>'+
      '<textarea class="memo-textarea" id="memoInput" placeholder="このシーンの状況・演出意図…" rows="3"'+(sk?' disabled':'')+' oninput="currentMemo=this.value">'+esc(currentMemo)+'</textarea>'+
    '</div>';

  // Axes
  var axes='<div class="panel" id="axesPanel">'+renderAxesInner()+'</div>';

  el.innerHTML=src+charBar+nav+memo+axes;
}

function renderAxesInner(){
  var cur=scenes[active],sk=cur.skipped;
  var complete=AXES.every(function(a){return currentSel[a.key]});
  var html='<div class="label" style="margin-bottom:var(--space-md)">COMPOSITION — 3 AXES</div>';
  if(sk){
    html+='<div style="font:var(--type-body);color:var(--ink-dim);font-style:italic">このシーンはスキップされています</div>';
    return html;
  }
  html+='<div style="display:flex;flex-direction:column;gap:var(--space-md)">';
  AXES.forEach(function(a){
    html+='<div><div class="label" style="margin-bottom:var(--space-xs)">'+a.mono+' · '+a.label+'</div><div style="display:flex;flex-wrap:wrap;gap:var(--space-xs)">';
    a.options.forEach(function(o){
      var sel=currentSel[a.key]===o;
      html+='<button class="opt-btn'+(sel?' selected':'')+'" onclick="pickOption(\''+a.key+'\',\''+o+'\')">'+o+'</button>';
    });
    html+='</div></div>';
  });
  html+='</div>';
  html+='<div style="margin-top:var(--space-md)"><button class="btn btn-primary" onclick="commitScene()"'+(complete?'':' disabled')+'>'+(cur.selection?'UPDATE SCENE':'ADD SCENE')+'</button></div>';
  if(cur.selection){
    var pg=cur.promptGenerating;
    var blockers=promptBlockers(cur);
    var disabled=pg||blockers.length;
    html+='<div style="margin-top:var(--space-sm)">'+
      '<button class="btn btn-secondary" onclick="generatePrompt('+active+')"'+(disabled?' disabled':'')+'>'+(pg?'生成中…':(cur.prompt?'PROMPT 再生成':'PROMPT 生成'))+'</button>'+
      (blockers.length&&!pg?'<div style="margin-top:4px;font:var(--type-label);color:var(--ink-dim)">⚠ '+esc(blockers.join(' / '))+'</div>':'')+
    '</div>';
  }
  return html;
}

function renderAxes(){
  var el=document.getElementById('axesPanel');
  if(el)el.innerHTML=renderAxesInner();
}

function renderRight(){
  var el=document.getElementById('rightCol');
  if(!scenes.length){
    el.innerHTML=
      '<div class="panel">'+
        '<div class="label">CURRENT SCENE</div>'+
        '<div style="padding:var(--space-lg) 0;text-align:center;font:var(--type-body);color:var(--ink-dim)">原稿ファイルを読み込んでください</div>'+
      '</div>';
    return;
  }
  var cur=scenes[active],sk=cur.skipped;
  var loc=cur.location;
  var chars=Array.isArray(cur.characters)?cur.characters:(cur.characters?[cur.characters]:[]);

  // Badges
  var bg='<span class="badge badge-gold">SCENE '+pad2(cur.number)+'</span>';
  bg+='<span class="badge badge-muted">'+pad2(active+1)+' / '+pad2(scenes.length)+'</span>';
  if(loc&&loc!==null)bg+='<span class="badge badge-muted">'+esc(loc)+'</span>';
  if(cur.era&&cur.era!=='要確認')bg+='<span class="badge badge-gold">'+esc(cur.era)+'</span>';
  else if(cur.era==='要確認')bg+='<span class="badge badge-muted">⚠ 時間軸：要確認</span>';
  else if(cur.era===undefined||cur.era===null)bg+='<span class="badge badge-muted">⚠ 時間軸未設定</span>';
  if(sk)bg+='<span class="badge badge-muted">スキップ</span>';
  if(cur.analyzing)bg+='<span class="badge badge-muted analyzing">解析中…</span>';
  var charCheckCount=Object.keys(CHARACTERS).length;
  if(charCheckCount){
    validateSceneCharacters(cur).forEach(function(v){
      var warn=v.status!=='ok';
      bg+='<span class="badge '+(warn?'badge-muted':'badge-muted')+'">'+(warn?'⚠ ':'')+esc(v.name)+
        (v.status==='unresolved'?'（JSON内に該当なし）':v.status==='era_missing'?'（該当eraなし）':v.status==='era_unknown'?'（時間軸未確定）':'')+
        '</span>';
    });
  }else{
    chars.forEach(function(c){bg+='<span class="badge badge-muted">'+esc(c)+'</span>'});
  }

  // Card
  var rawDisp=cur.rawText.replace(/\n/g,' ');
  if(rawDisp.length>120)rawDisp=rawDisp.substring(0,120)+'…';
  var numColor=sk?'var(--ink-dim)':'var(--gold)';
  var meta='';
  if(loc||chars.length){
    meta='<div class="sc-meta">';
    if(loc&&loc!==null)meta+='<span>◷ '+esc(loc)+'</span>';
    if(chars.length)meta+='<span>‹ '+chars.map(esc).join(' · ')+' ›</span>';
    meta+='</div>';
  }
  var card=
    '<article class="scene-card'+(sk?'':' active')+'" style="opacity:'+(sk?'.45':'1')+';filter:'+(sk?'grayscale(.6)':'none')+';transition:all .3s">'+
      '<div class="sc-num" style="color:'+numColor+'">SCENE '+pad2(cur.number)+'</div>'+
      '<p class="sc-text">'+esc(rawDisp)+'</p>'+
      meta+
    '</article>';

  var promptPanel='';
  if(cur.prompt||cur.promptGenerating){
    promptPanel=
      '<div class="panel">'+
        '<div style="display:flex;align-items:center;gap:var(--space-sm);margin-bottom:var(--space-sm)">'+
          '<span class="label">IMAGE PROMPT</span>'+
          (cur.prompt?'<button class="copy-btn" id="copyPromptBtn" onclick="copyPrompt('+active+')" style="margin-left:auto">COPY PROMPT</button>':'')+
        '</div>'+
        (cur.promptGenerating?
          '<div style="padding:var(--space-md) 0;text-align:center;font:var(--type-body);color:var(--ink-dim)">生成中…</div>':
          '<pre class="output-pre">'+esc(cur.prompt||'')+'</pre>'
        )+
      '</div>';
  }

  el.innerHTML=
    '<div class="panel">'+
      '<div class="label" style="margin-bottom:var(--space-sm)">CURRENT SCENE</div>'+
      '<div style="display:flex;align-items:center;gap:var(--space-xs);margin-bottom:var(--space-sm);flex-wrap:wrap">'+bg+'</div>'+
      card+
    '</div>'+
    '<div class="panel">'+
      '<div class="label" style="margin-bottom:var(--space-sm)">COMPOSITION PREVIEW</div>'+
      '<div id="previewContainer"></div>'+
    '</div>'+
    promptPanel;
  renderPreview();
}

function renderPreview(){
  var el=document.getElementById('previewContainer');if(!el)return;
  if(!scenes.length){el.innerHTML='<div class="preview-box preview-empty">原稿を読み込んでください</div>';return}
  if(scenes[active].skipped){el.innerHTML='<div class="preview-box preview-empty" style="opacity:.5">SKIPPED</div>';return}
  var sel=currentSel;
  if(!AXES.every(function(a){return sel[a.key]})){
    el.innerHTML='<div class="preview-box preview-empty">三軸を選ぶと構図が立ち上がる<br>SELECT ALL THREE AXES</div>';return;
  }
  var vMap={'ハイ':'28%','アイレベル':'50%','ロー':'68%'};
  var v=vMap[sel.angle]||'50%';
  var sMap={'CU':60,'バスト':42,'ミディアム':28,'ロング':14};
  var sz=sMap[sel.size]||28;
  var hMap={'正面':'50%','斜め前':'42%','横':'35%','斜め後ろ':'60%','背後':'50%','POV':'50%'};
  var h=hMap[sel.direction]||'50%';
  var flip=sel.direction==='斜め後ろ'||sel.direction==='横';
  var back=sel.direction==='背後';
  var pov=sel.direction==='POV';
  var grid=['33%','66%'].map(function(x){
    return '<div style="position:absolute;left:'+x+';top:0;bottom:0;width:1px;background:rgba(212,168,67,.1)"></div>'+
           '<div style="position:absolute;top:'+x+';left:0;right:0;height:1px;background:rgba(212,168,67,.1)"></div>'
  }).join('');
  var eye=back?'':'<div style="position:absolute;top:22%;right:18%;width:6px;height:6px;border-radius:50%;background:rgba(212,168,67,.75)"></div>';
  var subj;
  if(pov){
    subj='<div style="position:absolute;inset:12%;border:1px solid rgba(212,168,67,.3);border-radius:2px;box-shadow:inset 0 0 80px 30px rgba(0,0,0,.8)"></div>';
  }else{
    subj='<div style="position:absolute;left:'+h+';top:'+v+';'+
      'transform:translate(-50%,-50%) scaleX('+(flip?-1:1)+');'+
      'width:'+sz+'%;aspect-ratio:3/4;'+
      'background:linear-gradient(180deg,rgba(192,57,43,.3),rgba(139,26,26,.1));'+
      'border:1px solid var(--crimson);border-radius:46% 46% 18% 18%">'+eye+'</div>';
  }
  var lbl='<div style="position:absolute;left:10px;bottom:8px;font:var(--type-label);letter-spacing:var(--text-mono-track);color:var(--gold)">'+
    esc(sel.angle)+' · '+esc(sel.size)+' · '+esc(sel.direction)+'</div>';
  el.innerHTML='<div class="preview-box preview-filled">'+grid+subj+lbl+'</div>';
}

function renderOutput(){
  var el=document.getElementById('outputArea');
  if(!scenes.length){el.innerHTML='';return}
  var r=getBlockRange(active);
  var md=buildMarkdown();
  var body=md?'<pre class="output-pre">'+esc(md)+'</pre>':
    '<div class="label" style="color:var(--ink-dim);padding:var(--space-md) 0;text-align:center">このブロックにはまだ確定済みシーンがありません</div>';
  var promptsMd=buildPromptsOutput();
  var promptsBody=promptsMd?'<pre class="output-pre">'+esc(promptsMd)+'</pre>':
    '<div class="label" style="color:var(--ink-dim);padding:var(--space-md) 0;text-align:center">このブロックにはまだ生成済みプロンプトがありません</div>';
  el.innerHTML=
    '<div class="panel" style="padding:var(--space-md)">'+
      '<div style="display:flex;align-items:center;gap:var(--space-sm);margin-bottom:var(--space-sm)">'+
        '<span class="label">OUTPUT — BLOCK '+(r.block+1)+' · OBSIDIAN MARKDOWN</span>'+
        '<button class="copy-btn" id="copyBtn" onclick="copyOutput()" style="margin-left:auto">COPY</button>'+
      '</div>'+
      body+
    '</div>'+
    '<div class="panel" style="padding:var(--space-md);margin-top:var(--space-sm)">'+
      '<div style="display:flex;align-items:center;gap:var(--space-sm);margin-bottom:var(--space-sm)">'+
        '<span class="label">PROMPTS — BLOCK '+(r.block+1)+' · 画像生成AI用</span>'+
        '<button class="copy-btn" id="copyPromptsBlockBtn" onclick="copyPromptsOutput()" style="margin-left:auto">COPY</button>'+
      '</div>'+
      promptsBody+
    '</div>';
}

  '<div id="headerArea"></div>'+
  '<div id="progressArea"></div>'+
  '<div class="workspace"><div class="col" id="leftCol"></div><div class="col" id="rightCol"></div></div>'+
  '<div style="padding:0 var(--space-lg) var(--space-lg)" id="outputArea"></div>';
renderAll();
