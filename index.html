<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>怪奇書籍館｜ツールダッシュボード</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="design-system.css">
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .subtitle {
    margin-bottom: 56px;
  }

  h1 {
    font: var(--type-display);
    color: var(--gold);
    letter-spacing: 0.04em;
    margin-bottom: 8px;
    text-align: center;
  }

  .tools {
    display: flex;
    gap: 20px;
  }

  .tool-card {
    width: 220px;
    text-decoration: none;
    color: var(--ink);
    transition: transform .2s, border-color .2s;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }
  .tool-card:hover {
    border-color: var(--gold-dim);
    transform: translateY(-2px);
  }

  .tool-icon {
    width: 32px;
    height: 32px;
    margin-bottom: 4px;
  }
  .tool-icon svg {
    width: 32px;
    height: 32px;
    stroke: var(--ink-mid);
    stroke-width: 1.5;
    fill: none;
    transition: stroke 0.2s;
  }
  .tool-card:hover .tool-icon svg { stroke: var(--gold); }

  .tool-name {
    font: var(--type-heading);
    color: var(--ink);
  }

  .tool-desc {
    font: var(--type-body);
    font-size: 12px;
    color: var(--ink-dim);
    line-height: 1.6;
  }

  .footer {
    position: fixed;
    bottom: 20px;
  }
</style>
</head>
<body>

<script src="washi.js"></script>

  <div class="label">怪奇書籍館 — tools</div>
  <h1>怪奇書籍館</h1>
  <div class="label subtitle">怪談動画制作ツール一覧</div>

  <div class="tools">
    <a class="tool-card panel" href="kaidan_composition_builder.html">
      <div class="tool-icon">
        <!-- Film icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
          <line x1="7" y1="2" x2="7" y2="22"></line>
          <line x1="17" y1="2" x2="17" y2="22"></line>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <line x1="2" y1="7" x2="7" y2="7"></line>
          <line x1="2" y1="17" x2="7" y2="17"></line>
          <line x1="17" y1="17" x2="22" y2="17"></line>
          <line x1="17" y1="7" x2="22" y2="7"></line>
        </svg>
      </div>
      <span class="badge badge-gold">tool 01</span>
      <div class="tool-name">構図ビルダー</div>
      <div class="tool-desc">シーン一覧を読み込んで3軸の構図をポチポチ決める</div>
    </a>

    <a class="tool-card panel" href="kaidan_image_renamer.html">
      <div class="tool-icon">
        <!-- Images icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
      </div>
      <span class="badge badge-gold">tool 02</span>
      <div class="tool-name">画像リネーマー</div>
      <div class="tool-desc">生成画像を確認しながら連番リネームしてZIPで出力</div>
    </a>
  </div>

  <div class="label footer">v0.1 — 怪奇書籍館制作ツール</div>

</body>
</html>
