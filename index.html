<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>怪奇書籍館｜構図ビルダー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --surface2: #1e1e21;
    --border: #2a2a2e;
    --accent: #c8a96e;
    --accent2: #7c6a4e;
    --text: #e8e4dc;
    --text-dim: #7a776f;
    --text-mid: #a8a49c;
    --selected: #2a2318;
    --selected-border: #c8a96e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    padding: 24px;
  }

  .header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 24px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .header span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
  }

  .panel-title {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 4px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    margin-bottom: 12px;
  }
  .upload-zone:hover { border-color: var(--accent2); }
  .upload-zone p { font-size: 13px; color: var(--text-dim); }

  .scene-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .scene-nav button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-mid);
    padding: 6px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .scene-nav button:hover { border-color: var(--accent2); color: var(--accent); }
  .scene-nav button:disabled { opacity: 0.3; cursor: default; }

  .scene-nav .scene-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    flex: 1;
    text-align: center;
  }

  .scene-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px;
    margin-bottom: 14px;
    min-height: 80px;
  }

  .scene-card .scene-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .scene-card .scene-text {
    font-size: 12px;
    color: var(--text-mid);
    line-height: 1.6;
  }

  .situation-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px;
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }
  .situation-input:focus { border-color: var(--accent2); }
  .situation-input::placeholder { color: var(--text-dim); }

  .axis-section { margin-bottom: 16px; }
  .axis-label {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    margin-bottom: 8px;
    letter-spacing: 0.08em;
  }

  .options-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .option-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-mid);
    padding: 6px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .option-btn:hover { border-color: var(--accent2); color: var(--text); }
  .option-btn.selected {
    background: var(--selected);
    border-color: var(--selected-border);
    color: var(--accent);
  }

  .action-row {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }

  .btn-primary {
    background: var(--accent2);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    flex: 1;
  }
  .btn-primary:hover { background: #3a2f1e; }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--text-mid); }

  .output-panel {
    grid-column: 1 / -1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .progress-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }

  .progress-dot {
    width: 24px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    transition: background 0.3s;
  }
  .progress-dot.done { background: var(--accent); }
  .progress-dot.current { background: var(--accent2); }

  .output-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    color: var(--text-mid);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    min-height: 200px;
    resize: vertical;
    outline: none;
  }

  .copy-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    margin-top: 10px;
  }
  .copy-btn:hover { border-color: var(--accent2); color: var(--accent); }
  .copy-btn.copied { border-color: var(--accent); color: var(--accent); }

  .status-msg {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
    min-height: 16px;
  }
  .status-msg.ok { color: var(--accent); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.8;
  }
</style>
</head>
<body>

<div class="header">
  <h1>怪奇書籍館｜構図ビルダー</h1>
  <span>v0.1 — composition builder</span>
</div>

<div class="main-grid">

  <div class="panel">
    <div class="panel-title">STEP 01 — シーン一覧を読み込む</div>

    <div class="upload-zone" onclick="document.getElementById('mdFile').click()">
      <p>📄 シーン一覧 .md をクリックして選択</p>
      <input type="file" id="mdFile" accept=".md,.txt" style="display:none" onchange="loadMdFile(event)">
    </div>

    <div class="scene-nav">
      <button onclick="prevScene()" id="btnPrev" disabled>◀</button>
      <span class="scene-info" id="sceneInfo">— / —</span>
      <button onclick="nextScene()" id="btnNext" disabled>▶</button>
    </div>

    <div class="scene-card" id="sceneCard">
      <div class="empty-state">mdファイルを読み込むとシーンが表示されます</div>
    </div>

    <div class="panel-title" style="margin-top:4px;">STEP 02 — 状況メモ（雑でOK）</div>
    <textarea class="situation-input" id="situationInput" placeholder="例：廃校の教室。僕とKが恐怖で固まってる。扉の向こうに何かいる気配。"></textarea>

    <div class="panel-title">STEP 03 — 3軸を選ぶ</div>

    <div class="axis-section">
      <div class="axis-label">ANGLE（高さ）</div>
      <div class="options-grid" id="angleOptions">
        <button class="option-btn" onclick="selectOpt('angle',this,&quot;バードアイ / bird's-eye view&quot;)">バードアイ</button>
        <button class="option-btn" onclick="selectOpt('angle',this,'ハイアングル / high angle')">ハイアングル</button>
        <button class="option-btn" onclick="selectOpt('angle',this,'アイレベル / eye level')">アイレベル</button>
        <button class="option-btn" onclick="selectOpt('angle',this,'ローアングル / low angle')">ローアングル</button>
        <button class="option-btn" onclick="selectOpt('angle',this,&quot;ワームアイ / worm's-eye view&quot;)">ワームアイ</button>
        <button class="option-btn" onclick="selectOpt('angle',this,'ダッチアングル / dutch angle')">ダッチ</button>
      </div>
    </div>

    <div class="axis-section">
      <div class="axis-label">SIZE（距離）</div>
      <div class="options-grid" id="sizeOptions">
        <button class="option-btn" onclick="selectOpt('size',this,'エクストリームロング / extreme long shot')">ELS</button>
        <button class="option-btn" onclick="selectOpt('size',this,'ロングショット / long shot')">ロング</button>
        <button class="option-btn" onclick="selectOpt('size',this,'ミディアム / medium shot')">ミディアム</button>
        <button class="option-btn" onclick="selectOpt('size',this,'バストショット / bust shot')">バスト</button>
        <button class="option-btn" onclick="selectOpt('size',this,'クローズアップ / close-up')">CU</button>
        <button class="option-btn" onclick="selectOpt('size',this,'エクストリームCU / extreme close-up')">ECU</button>
      </div>
    </div>

    <div class="axis-section">
      <div class="axis-label">DIRECTION（方向・視点）</div>
      <div class="options-grid" id="dirOptions">
        <button class="option-btn" onclick="selectOpt('dir',this,'正面 / front view')">正面</button>
        <button class="option-btn" onclick="selectOpt('dir',this,'斜め前 / 3/4 front view')">斜め前</button>
        <button class="option-btn" onclick="selectOpt('dir',this,'横 / side view')">横</button>
        <button class="option-btn" onclick="selectOpt('dir',this,'斜め後ろ / 3/4 back view')">斜め後ろ</button>
        <button class="option-btn" onclick="selectOpt('dir',this,'背後 / back view')">背後</button>
        <button class="option-btn" onclick="selectOpt('dir',this,'一人称 / POV')">POV</button>
      </div>
    </div>

    <div class="action-row">
      <button class="btn-primary" onclick="addScene()">このシーンを追加 →</button>
      <button class="btn-secondary" onclick="resetCurrent()">リセット</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">PROGRESS — 10シーンバッチ</div>
    <div class="progress-bar" id="progressBar"></div>
    <div id="doneList">
      <div class="empty-state">まだシーンが追加されていません</div>
    </div>
  </div>

  <div class="output-panel">
    <div class="output-header">
      <div class="panel-title" style="margin:0;border:none;padding:0;">OUTPUT — Markdown（Obsidian用）</div>
      <div style="display:flex;gap:8px;">
        <button class="copy-btn" id="copyBtn" onclick="copyOutput()">📋 一括コピー</button>
        <button class="copy-btn" id="resetBatchBtn" onclick="resetBatch()" style="border-color:#8b3a3a;color:#c97a7a;">🔄 次の10カットへ</button>
      </div>
    </div>
    <textarea class="output-textarea" id="outputArea" readonly placeholder="シーンを追加するとここにMarkdownが生成されます..."></textarea>
    <div class="status-msg" id="statusMsg"></div>
  </div>

</div>

<script>
  var scenes = [];
  var currentIdx = 0;
  var batch = [];
  var selections = { angle: null, size: null, dir: null };

  function loadMdFile(event) {
    var file = event.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) { parseMd(e.target.result); };
    reader.readAsText(file, 'UTF-8');
  }

  function parseMd(text) {
    scenes = [];
    var lines = text.split('\n');

    // テーブル行だけ抽出
    var tableLines = [];
    for (var i = 0; i < lines.length; i++) {
      var l = lines[i].trim();
      if (l.startsWith('|')) tableLines.push(l);
    }

    // ヘッダー行と区切り行（|---|）をスキップしてデータ行だけ処理
    for (var j = 0; j < tableLines.length; j++) {
      var line = tableLines[j];

      // 区切り行スキップ（|---|---|のパターン）
      if (/^\|[\s\-|:]+\|$/.test(line)) continue;

      var cols = line.split('|').map(function(c){ return c.trim(); }).filter(function(c, idx, arr){
        return idx > 0 && idx < arr.length - 1;
      });

      if (cols.length < 2) continue;

      var num = cols[0].replace(/<br>/gi, '').trim();

      // ヘッダー行スキップ（#や日本語ヘッダー）
      if (num === '#' || num === '' || /^[ぁ-んァ-ン一-龥A-Za-z＃]+$/.test(num)) continue;
      // 数字またはゼロ埋め数字のみ通す
      if (!/^\d+$/.test(num.replace(/^#/, ''))) continue;

      // # プレフィックスを除去
      num = num.replace(/^#/, '');

      var rawText  = cols[1] || '';
      var summary  = cols[2] || cols[1] || '';
      var location = cols[3] || '';
      var characters = cols[4] || '';

      scenes.push({
        num: num.padStart(2, '0'),
        raw: rawText.replace(/<br>/gi, ' '),
        summary: summary,
        location: location,
        characters: characters
      });
    }

    currentIdx = 0;
    renderScene();
    renderProgress();

    if (scenes.length > 0) {
      setStatus(scenes.length + 'シーンを読み込みました', true);
    } else {
      setStatus('シーンが見つかりませんでした。表形式(|#|原稿|概要|場所|登場人物|)を確認してください');
    }
  }

  function renderScene() {
    var card = document.getElementById('sceneCard');
    var info = document.getElementById('sceneInfo');

    if (scenes.length === 0) {
      card.innerHTML = '<div class="empty-state">mdファイルを読み込むとシーンが表示されます</div>';
      info.textContent = '— / —';
      return;
    }

    var s = scenes[currentIdx];
    var isDone = batch.find(function(b){ return b.sceneNum === s.num; });

    card.innerHTML =
      '<div class="scene-num">SCENE #' + s.num + (isDone ? ' ✓ 追加済み' : '') + '</div>' +
      '<div class="scene-text">' +
      (s.raw ? '<strong>原文:</strong> ' + s.raw.substring(0,80) + (s.raw.length > 80 ? '…' : '') + '<br>' : '') +
      (s.summary ? '<strong>概要:</strong> ' + s.summary + '<br>' : '') +
      (s.location ? '<strong>場所:</strong> ' + s.location + '<br>' : '') +
      (s.characters ? '<strong>人物:</strong> ' + s.characters : '') +
      '</div>';

    info.textContent = (currentIdx + 1) + ' / ' + scenes.length;
    document.getElementById('btnPrev').disabled = currentIdx === 0;
    document.getElementById('btnNext').disabled = currentIdx === scenes.length - 1;
  }

  function prevScene() { if (currentIdx > 0) { currentIdx--; renderScene(); } }
  function nextScene() { if (currentIdx < scenes.length - 1) { currentIdx++; renderScene(); } }

  function selectOpt(axis, btn, value) {
    var groupId = { angle: 'angleOptions', size: 'sizeOptions', dir: 'dirOptions' }[axis];
    document.querySelectorAll('#' + groupId + ' .option-btn').forEach(function(b){ b.classList.remove('selected'); });
    btn.classList.add('selected');
    selections[axis] = value;
  }

  function addScene() {
    if (scenes.length === 0) { setStatus('先にmdファイルを読み込んでください'); return; }
    if (!selections.angle || !selections.size || !selections.dir) { setStatus('3軸すべてを選択してください'); return; }

    var s = scenes[currentIdx];
    var situation = document.getElementById('situationInput').value.trim();

    var entry = {
      sceneNum: s.num,
      raw: s.raw,
      summary: s.summary,
      location: s.location,
      characters: s.characters,
      situation: situation || '（状況メモなし）',
      angle: selections.angle,
      size: selections.size,
      dir: selections.dir
    };

    var existIdx = batch.findIndex(function(b){ return b.sceneNum === s.num; });
    if (existIdx >= 0) batch[existIdx] = entry;
    else batch.push(entry);

    renderProgress();
    renderOutput();
    renderScene();
    setStatus('シーン #' + s.num + ' を追加しました', true);

    if (currentIdx < scenes.length - 1) {
      setTimeout(function(){ nextScene(); resetSelections(); }, 300);
    }
  }

  function resetCurrent() {
    document.getElementById('situationInput').value = '';
    resetSelections();
    setStatus('リセットしました');
  }

  function resetSelections() {
    selections = { angle: null, size: null, dir: null };
    document.querySelectorAll('.option-btn').forEach(function(b){ b.classList.remove('selected'); });
    document.getElementById('situationInput').value = '';
  }

  function renderProgress() {
    var bar = document.getElementById('progressBar');
    var list = document.getElementById('doneList');

    bar.innerHTML = '';
    for (var i = 0; i < 10; i++) {
      var dot = document.createElement('div');
      dot.className = 'progress-dot' + (i < batch.length ? ' done' : (i === batch.length ? ' current' : ''));
      bar.appendChild(dot);
    }

    if (batch.length === 0) {
      list.innerHTML = '<div class="empty-state">まだシーンが追加されていません</div>';
      return;
    }

    list.innerHTML = batch.map(function(b){
      return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">' +
        '<span style="font-family:JetBrains Mono,monospace;color:var(--accent);min-width:48px;">#' + b.sceneNum + '</span>' +
        '<span style="color:var(--text-mid);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">' + b.summary + '</span>' +
        '<span style="font-family:JetBrains Mono,monospace;color:var(--text-dim);font-size:10px;">✓</span>' +
        '</div>';
    }).join('');
  }

  function renderOutput() {
    var md = batch.map(function(b){
      return '## シーン #' + b.sceneNum + '\n\n' +
        '**概要：** ' + b.summary + '\n' +
        '**場所：** ' + (b.location || '—') + '\n' +
        '**人物：** ' + (b.characters || '—') + '\n\n' +
        '**状況メモ：** ' + b.situation + '\n\n' +
        '| 軸 | 設定 |\n' +
        '|---|---|\n' +
        '| アングル | ' + b.angle + ' |\n' +
        '| サイズ | ' + b.size + ' |\n' +
        '| 方向 | ' + b.dir + ' |\n\n' +
        '---';
    }).join('\n\n');

    document.getElementById('outputArea').value = md;
  }

  function resetBatch() {
    if (batch.length === 0) { setStatus('バッチが空です'); return; }
    if (!confirm('このバッチをリセットして次の10カットに進みますか？\n（コピーが済んでいることを確認してください）')) return;
    batch = [];
    document.getElementById('outputArea').value = '';
    renderProgress();
    resetSelections();
    setStatus('バッチをリセットしました。次の10カットをどうぞ', true);
  }

  function copyOutput() {
    var text = document.getElementById('outputArea').value;
    if (!text.trim()) { setStatus('出力がまだありません'); return; }
    navigator.clipboard.writeText(text).then(function(){
      var btn = document.getElementById('copyBtn');
      btn.textContent = '✓ コピー完了';
      btn.classList.add('copied');
      setStatus(batch.length + 'シーン分をコピーしました', true);
      setTimeout(function(){ btn.textContent = '📋 一括コピー'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function setStatus(msg, ok) {
    var el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg' + (ok ? ' ok' : '');
  }

  renderProgress();
</script>
</body>
</html>
